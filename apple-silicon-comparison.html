<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Silicon Dashboard</title>
  <style>
    body { margin: 0; }
    #theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      padding: 8px 16px;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: #222;
      color: #eee;
      transition: background 0.2s, color 0.2s;
    }
    html.light-mode #theme-toggle { background: #f0f0f0; color: #222; border-color: #ccc; }
    html.light-mode #root { filter: invert(1) hue-rotate(180deg); }
    html.light-mode body { background: #f5f5f5; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <button id="theme-toggle" onclick="document.documentElement.classList.toggle('light-mode'); this.textContent = document.documentElement.classList.contains('light-mode') ? 'Dark Mode' : 'Light Mode'">Light Mode</button>
  <div id="root"></div>
  <script>
    fetch('apple-silicon-comparison.jsx')
      .then(r => r.text())
      .then(code => {
        // Strip all import statements (single-line and multi-line)
        code = code.replace(/^import\s[\s\S]*?from\s+["'].*?["'];?\s*$/gm, '');
        code = code.replace(/^import\s*{[^}]*}\s*from\s*["'].*?["'];?\s*$/gm, '');
        // Also catch multi-line imports by removing everything between import and the closing from line
        code = code.replace(/^import\s*\{[\s\S]*?\}\s*from\s*["'].*?["'];?\s*$/gm, '');
        code = code.replace('export default ', '');
        const preamble = `
const { useState } = React;
const {
  BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
  RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
  LineChart, Line, CartesianGrid, Legend, AreaChart, Area
} = Recharts;
`;
        const postamble = `
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppleSiliconDashboard));
`;
        const fullCode = preamble + code + postamble;
        const output = Babel.transform(fullCode, { presets: ['react'] }).code;
        eval(output);
      })
      .catch(err => {
        document.getElementById('root').textContent = 'Failed to load dashboard: ' + err.message;
      });
  </script>
</body>
</html>
